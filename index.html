<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cabin Boyz - Run From The Sun</title>
  <meta name="description" content="Back Run From The Sun on Kickstarter by Shawn DePasquale and Matt Cohen.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <a href="https://www.kickstarter.com/projects/devilsdue/devils-due-presents-run-from-the-sun" class="landing-link" target="_blank" rel="noopener noreferrer">
      <div class="landing-container">
        <img src="Images/SawaTheCabinBoyz_underconstruction.png" alt="Devon Sawa - Run From The Sun" class="landing-image">
      </div>
    </a>
    
    <section class="contact-section">
      <h2>Get in Touch</h2>
      <p>Have questions about Run From The Sun? Drop us a line below.</p>
      <form action="https://formspree.io/f/maqgpkwg" method="POST" class="contact-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="form-submit">Send Message</button>
      </form>
    </section>
  </div>
</body>
</html>
